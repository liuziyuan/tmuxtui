name: publish

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build

      - name: Check if version is new
        id: version-check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view tmux-tui version 2>/dev/null || echo "0.0.0")
          if [ "$PKG_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "Version $PKG_VERSION already published, skipping"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: $PKG_VERSION (published: $PUBLISHED_VERSION)"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.should_publish == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git tag
        if: steps.version-check.outputs.should_publish == 'true'
        run: |
          git tag "v${{ steps.version-check.outputs.version }}"
          git push origin "v${{ steps.version-check.outputs.version }}"

      - name: Create GitHub Release
        if: steps.version-check.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version-check.outputs.version }}"
          generate_release_notes: true
