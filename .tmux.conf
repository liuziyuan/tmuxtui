# tmux 配置


# 把 prefix 改成 Ctrl+a（更顺手）
set -g prefix C-a
unbind C-b

# 开启鼠标支持
set -g mouse on

# 基于索引从 1 开始
set -g base-index 1
setw -g pane-base-index 1

# 分屏快捷键
bind | split-window -h    # prefix | 左右分屏
bind - split-window -v    # prefix - 上下分屏

# 用 hjkl 移动 pane（vim 风格）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 关闭当前 pane（带确认）
bind x kill-pane

# 在 pane 边框显示标题（包括未激活的 pane）
set -g pane-border-status top
set -g pane-border-format " #[fg=#BD93F9]#P#[default]#{?#{@claude_pane_status}, #[fg=#F1FA8C]#{@claude_pane_status}#[default],} #{pane_title} "
set -g pane-active-border-style "fg=#BD93F9"
set -g pane-border-style "fg=#6272A4"

# 快速重载配置
bind r source-file ~/.tmux.conf \; display "配置已重载"

# --- Plugins ---
# 激活的主题
set -g @plugin 'erikw/tmux-powerline'

# 已安装但未激活（需要时取消注释）
# set -g @plugin 'catppuccin/tmux'
# set -g @plugin 'jimeh/tmux-themepack'

# TPM 初始化（必须放最后）
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'

# Claude Code 状态栏（必须在 TPM 之后，覆盖 powerline 的设置）
set -g status-right "#{?#{@claude_all_status},#{@claude_all_status} ,}#(/Users/liuziyuan/.tmux/plugins/tmux-powerline/powerline.sh right)"
set -g status-right-length 120
